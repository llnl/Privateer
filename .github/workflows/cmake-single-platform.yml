name: Privateer CI Test

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mpi4py/setup-mpi@v1
      - name: Install spdlog
        run: sudo apt install libspdlog-dev
      - name: Clone repo
        run: cd $GITHUB_WORKSPACE
      - name: Install Boost
        uses: MarkusJx/install-boost@v2.4.5
        id: install-boost
        with:
          boost_version: 1.84.0
      - name: Build
        run: |
          mkdir build && cd build
          cmake -DCMAKE_INSTALL_PREFIX=. -DCMAKE_BUILD_TYPE=Debug ..
          make install -j8
          ctest --output-on-failure
  build_zstd:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mpi4py/setup-mpi@v1
      - name: Install spdlog
        run: sudo apt install libspdlog-dev
      - name: Clone repo
        run: cd $GITHUB_WORKSPACE
      - name: Install Boost
        uses: MarkusJx/install-boost@v2.4.5
        id: install-boost
        with:
          boost_version: 1.84.0
      - name: Install zstd
        run: sudo apt install libzstd-dev
      - name: Build
        run: |
          mkdir build && cd build
          cmake -DENABLE_ZSTD=ON -DCMAKE_INSTALL_PREFIX=. -DCMAKE_BUILD_TYPE=Debug ..
          make install -j8
          ctest --output-on-failure
  build_zstd_upterm:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup upterm session
      uses: lhotari/action-upterm@v1
      with:
        ## limits ssh access and adds the ssh public key for the user which triggered the workflow
        limit-access-to-actor: true
        ## limits ssh access and adds the ssh public keys of the listed GitHub users
        limit-access-to-users: karimyoussef91
  build_uffd:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mpi4py/setup-mpi@v1
      - name: Install spdlog
        run: sudo apt install libspdlog-dev
      - name: Clone repo
        run: cd $GITHUB_WORKSPACE
      - name: Install Boost
        uses: MarkusJx/install-boost@v2.4.5
        id: install-boost
        with:
          boost_version: 1.84.0
      - name: Build
        run: |
          mkdir build && cd build
          cmake -DENABLE_UFFD=ON -DCMAKE_INSTALL_PREFIX=. -DCMAKE_BUILD_TYPE=Debug ..
          make install -j8
          ctest --output-on-failure
  build_uffd_zstd:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mpi4py/setup-mpi@v1
      - name: Install spdlog
        run: sudo apt install libspdlog-dev
      - name: Clone repo
        run: cd $GITHUB_WORKSPACE
      - name: Install Boost
        uses: MarkusJx/install-boost@v2.4.5
        id: install-boost
        with:
          boost_version: 1.84.0
      - name: Install zstd
        run: sudo apt install libzstd-dev
      - name: Build
        run: |
          mkdir build && cd build
          cmake -DENABLE_UFFD=ON -DENABLE_ZSTD=ON -DCMAKE_INSTALL_PREFIX=. -DCMAKE_BUILD_TYPE=Debug ..
          make install -j8
          ctest --output-on-failure
